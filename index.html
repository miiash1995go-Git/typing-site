<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduTyping Next | 実務教育タイピング</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&family=Roboto+Mono:wght@500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="app">
        <header>
            <div class="logo">EduTyping <span>Next</span></div>
            <div id="ad-banner" class="ad-placeholder">【広告スペース：バナー広告】</div>
        </header>

        <main>
            <section id="start-screen" class="screen">
                <div class="card">
                    <h1>実務特化型タイピング練習</h1>
                    <p>平均350文字の入力で終了します（最大4分）</p>
                    <div id="category-selector" class="btn-group">
                        <button class="btn-category active" data-cat="business">ビジネスメール</button>
                        <button class="btn-category" data-cat="excel">Excel/Word</button>
                        <button class="btn-category" data-cat="it_literacy">ITリテラシー</button>
                    </div>
                    <button id="start-btn" class="btn-main">練習開始</button>
                </div>
            </section>

            <section id="game-screen" class="screen hidden">
                <div class="stats">
                    <div class="stat-box">経過時間 <span id="timer">00:00.00</span></div>
                    <div class="stat-box">WPM <span id="wpm">0</span></div>
                    <div class="stat-box">正確率 <span id="accuracy">100</span>%</div>
                </div>

                <div class="typing-display">
                    <div id="display-kanji">...</div>
                    <div id="display-kana">...</div>
                    <div id="display-romaji"></div>
                </div>

                <div id="keyboard"></div>
            </section>

            <section id="result-screen" class="screen hidden">
                <div class="result-container">
                    <div class="result-main">
                        <h2>練習結果</h2>
                        <div class="rank-display">
                            <span class="rank-label">RANK</span>
                            <span id="result-rank">-</span>
                        </div>
                        <div class="result-grid">
                            <div class="res-item">スコア: <span id="res-score">0</span></div>
                            <div class="res-item">タイム: <span id="res-time">0</span></div>
                            <div class="res-item">WPM: <span id="res-wpm">0</span></div>
                            <div class="res-item">正確率: <span id="res-acc">0</span>%</div>
                            <div class="res-item">ミス数: <span id="res-miss">0</span></div>
                        </div>
                        <div class="weak-analysis">
                            <h3>苦手キー</h3>
                            <div id="res-weak"></div>
                        </div>
                        <button onclick="location.reload()" class="btn-main">もう一度挑戦</button>
                    </div>
                    <div class="result-ad">
                        <div class="ad-video-placeholder">【広告：動画広告枠】</div>
                    </div>
                </div>
            </section>
        </main>
    </div>
    <script src="js/main.js"></script>
</body>
</html>
