<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduTyping Next | 実務教育タイピング</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&family=Roboto+Mono:wght@500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="app">
        <header>
            <div class="logo">EduTyping <span>Next</span></div>
            <div id="ad-banner" class="ad-placeholder">【広告スペース：バナー広告】</div>
        </header>

        <main>
            <!-- スタート画面 -->
            <section id="start-screen" class="screen">
                <div class="card">
                    <h1>実務特化型タイピング練習</h1>
                    <p>職業訓練・MOS対策に最適なカリキュラム</p>
                    <div id="category-selector" class="btn-group">
                        <button class="btn-category active" data-cat="it_terms">IT用語</button>
                        <button class="btn-category" data-cat="word">Word (MOS)</button>
                        <button class="btn-category" data-cat="excel">Excel (MOS)</button>
                        <button class="btn-category" data-cat="business">ビジネス用語</button>
                        <button class="btn-category" data-cat="daily">日常会話</button>
                    </div>
                    <div class="settings-area">
                        <button id="sound-toggle" class="btn-toggle">タイプ音: ON</button>
                    </div>
                    <button id="start-btn" class="btn-main">練習開始</button>
                </div>
            </section>

            <!-- ゲーム画面 -->
            <section id="game-screen" class="screen hidden">
                <div class="stats">
                    <div class="stat-box">WPM <span id="wpm">0</span></div>
                    <div class="stat-box">正確率 <span id="accuracy">100</span>%</div>
                </div>

                <div id="typing-container" class="typing-display">
                    <div id="display-kanji">...</div>
                    <div id="display-kana">...</div>
                    <div id="display-romaji"></div>
                </div>

                <!-- 独自設計キーボード -->
                <div id="keyboard-container"></div>
                
                <p class="guide-text">中断して結果を見るには [Esc] キー</p>
            </section>

            <!-- 結果画面 -->
            <section id="result-screen" class="screen hidden">
                <div class="result-container">
                    <div class="result-side">
                        <h3>ミス入力の内訳</h3>
                        <div id="miss-detail-list" class="scroll-list"></div>
                    </div>
                    <div class="result-main">
                        <h2 id="result-title">練習結果</h2>
                        <div class="rank-display">
                            <span class="rank-label">RANK</span>
                            <span id="result-rank">-</span>
                        </div>
                        <div class="result-grid">
                            <div class="res-item">スコア: <span id="res-score">0</span></div>
                            <div class="res-item">タイム: <span id="res-time">0</span></div>
                            <div class="res-item">WPM: <span id="res-wpm">0</span></div>
                            <div class="res-item">正確率: <span id="res-acc">0</span>%</div>
                            <div class="res-item">ミス数: <span id="res-miss">0</span></div>
                        </div>
                        <button onclick="location.reload()" class="btn-main">もう一度挑戦</button>
                    </div>
                    <div class="result-ad">
                        <div class="ad-video-placeholder">【広告スペース】</div>
                    </div>
                </div>
            </section>
        </main>
    </div>
    <script src="js/main.js"></script>
</body>
</html>
