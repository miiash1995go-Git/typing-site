<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>実務用語辞典 | ぱそトレ！</title>
    <!-- 正しいCSSファイルを読み込む -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="portal-page">
    <div id="app">
        <header>
            <nav class="nav-menu">
                <a href="index.html">ホーム</a>
                <a href="play.html">タイピング</a>
                <a href="ai-tools.html">AI活用</a>
                <a href="career.html">就職・転職</a>
                <a href="glossary.html">用語集</a>
                <a href="guide.html">学習ガイド</a>
                <a href="contact.html">お問い合わせ</a>
            </nav>
            <div class="logo">ぱそトレ！ <span>実務用語辞典</span></div>
        </header>

        <main>
            <article class="static-page">
                <h1>実務用語集（データ完全同期）</h1>
                <p>タイピング練習で実際に登場する専門用語を解説しています。意味を理解しながら指に覚えさせることで、現場で役立つ実戦的なスキルが身につきます。</p>

                <!-- カテゴリジャンプメニュー（動的に生成） -->
                <div id="glossary-nav" class="glossary-nav">
                    <div class="loading-text">メニューを構成中...</div>
                </div>

                <!-- 用語リスト本体（動的に生成） -->
                <div id="glossary-container">
                    <div class="loading-text">用語データを同期しています...</div>
                </div>
            </article>
        </main>

        <footer>
            <div class="footer-links">
                <a href="privacy.html">プライバシーポリシー</a>
                <a href="contact.html">お問い合わせ</a>
                <a href="about.html">運営者情報</a>
            </div>
            <p>&copy; 2026 ぱそトレ！ Produced by miitype - All Rights Reserved.</p>
        </footer>
    </div>

    <!-- JSONデータを読み込んで表示するスクリプト -->
    <script>
        async function loadGlossary() {
            const container = document.getElementById('glossary-container');
            const nav = document.getElementById('glossary-nav');

            try {
                // 1. マニフェストを取得
                const manifestRes = await fetch('./data/category_manifest.json');
                if (!manifestRes.ok) throw new Error('Manifest not found');
                const manifest = await manifestRes.json();
                
                const categories = manifest.categories.filter(c => c.file !== 'all');
                
                container.innerHTML = '';
                nav.innerHTML = '';

                for (const cat of categories) {
                    // 2. ナビゲーションボタンを作成
                    const chip = document.createElement('a');
                    chip.href = `#cat-${cat.id}`;
                    chip.className = 'nav-chip';
                    chip.innerText = cat.name;
                    nav.appendChild(chip);

                    // 3. 個別JSONファイルを読み込み
                    const catRes = await fetch(`./data/typing/${cat.file}`);
                    if (!catRes.ok) continue;
                    const catData = await catRes.json();

                    // 4. セクションの作成
                    const section = document.createElement('section');
                    section.id = `cat-${cat.id}`;
                    section.className = 'glossary-section';

                    let sectionBody = `<h2 class="glossary-category-title">${cat.name}</h2>`;
                    sectionBody += `<div class="glossary-grid">`;

                    // 重複用語を排除（タイピングデータには同じ単語が含まれることがあるため）
                    const seen = new Set();
                    const uniqueQuestions = catData.questions.filter(q => {
                        const duplicate = seen.has(q.kanji);
                        seen.add(q.kanji);
                        return !duplicate;
                    });

                    uniqueQuestions.forEach(q => {
                        sectionBody += `
                            <div class="term-card">
                                <span class="term-word">${q.kanji}</span>
                                <p class="term-comment">${q.comment || '実務における重要な用語です。タイピング練習を通じて定着させましょう。'}</p>
                            </div>
                        `;
                    });

                    sectionBody += `</div>`;
                    section.innerHTML = sectionBody;
                    container.appendChild(section);
                }
            } catch (error) {
                console.error('Glossary sync error:', error);
                container.innerHTML = '<div class="loading-text" style="color:var(--error);">データの同期に失敗しました。パスを確認してください。</div>';
            }
        }

        window.addEventListener('DOMContentLoaded', loadGlossary);
    </script>
</body>
</html>
