        <main class="portal-main">
            <section class="section-container">
                <!-- お問い合わせフォーム専用カード -->
                <div class="static-page contact-form-card">
                    <h1>お問い合わせ</h1>
                    <p class="contact-intro">「ぱそトレ！」に関するご意見、ご要望、不具合報告などは、以下のフォームよりお願いいたします。現役パソコン講師の運営者が、内容を確認のうえ、大切に読ませていただきます。</p>

                    <!-- 【確定版】あなた専用ID xrevrleq 設定済み -->
                    <form action="https://formspree.io/f/xrevrleq" method="POST" class="contact-form">
                        <div class="form-group">
                            <label for="name">お名前 <span class="required">必須</span></label>
                            <input type="text" id="name" name="name" placeholder="例：ぱそトレ 太郎" required>
                        </div>

                        <div class="form-group">
                            <label for="email">メールアドレス <span class="required">必須</span></label>
                            <input type="email" id="email" name="email" placeholder="example@gmail.com" required>
                        </div>

                        <div class="form-group">
                            <label for="subject">お問い合わせの種類</label>
                            <select id="subject" name="subject">
                                <option value="ご意見・ご要望">ご意見・ご要望</option>
                                <option value="不具合報告">不具合報告（タイピング等）</option>
                                <option value="お仕事の依頼">お仕事の依頼・取材</option>
                                <option value="その他">その他</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label for="message">お問い合わせ内容 <span class="required">必須</span></label>
                            <textarea id="message" name="message" rows="6" placeholder="こちらに内容をご記入ください" required></textarea>
                        </div>

                        <div class="form-submit">
                            <button type="submit" class="btn-main">この内容で送信する</button>
                        </div>
                        <p class="form-notice">※送信後、自動的に受付完了画面へ移動します。</p>
                    </form>
                </div>
            </section>
        </main>
